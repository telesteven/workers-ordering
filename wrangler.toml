name = "workers-ordering"
main = "src/worker/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "d1-workers-ordering"
database_id = "86d0fdc9-a51d-49ff-8139-523b839a191d"

[[kv_namespaces]]
binding = "KV"
id = "1a8e11a997294ab3b3d3f8344b18e4b2"

[[r2_buckets]]
binding = "MEAL_IMAGES"
bucket_name = "ordering-meal-images"

# Secrets (set via `wrangler secret put`):
#   CHEF_PASSWORD
#   MANAGER_PASSWORD
#   SESSION_SECRET
