name = "workers-ordering"
main = "src/worker/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "ordering_db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "KV"
id = "1a8e11a997294ab3b3d3f8344b18e4b2"

[[r2_buckets]]
binding = "MEAL_IMAGES"
bucket_name = "ordering-meal-images"

# Secrets (set via `wrangler secret put`):
#   CHEF_PASSWORD
#   MANAGER_PASSWORD
#   SESSION_SECRET
