name = "workers-ordering"
main = "src/worker/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "d1-workers-ordering"
database_id = "25044be5-9272-41b9-9534-4da44fa4470e"

[[kv_namespaces]]
binding = "KV"
id = "1d6f3f196ccd41aa995fabc3f3250e21"

[[r2_buckets]]
binding = "MEAL_IMAGES"
bucket_name = "ordering-meal-images"

# Secrets (set via `wrangler secret put`):
#   CHEF_PASSWORD
#   MANAGER_PASSWORD
#   SESSION_SECRET
